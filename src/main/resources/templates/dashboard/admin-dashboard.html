<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f1f5f9;
        }

        .dashboard {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #1e293b;
            color: white;
            padding: 20px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .logout-btn {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background: #ef4444;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Main */
        .main-content {
            flex: 1;
            padding: 30px;
        }

        /* Cards */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: black;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card p {
            font-size: 14px;
            color: gray;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
    </style>
</head>

<body>

<div class="dashboard">

    <!-- Sidebar (Only Logo + Logout) -->
    <div class="sidebar">
        <div class="logo">📘 CAMPUSCORE</div>

        <form th:action="@{/admin/logout}" method="get">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <h1>Welcome Admin 👨‍💼</h1>

        <div class="card-container">

            <a th:href="@{/admin/pendingPosts}" class="card">
                <h3>📝 Admin Post</h3>
                <p>Create and manage posts</p>
            </a>

            <a th:href="@{/admin/events}" class="card">
                <h3>📅 Event Management</h3>
                <p>Organize campus events</p>
            </a>

            <a th:href="@{/admin/academic}" class="card">
                <h3>📘 Admin Academic</h3>
                <p>Manage academic content</p>
            </a>

            <a th:href="@{/admin/announcements}" class="card">
                <h3>📢 Admin Announcements</h3>
                <p>Make announcements</p>
            </a>

            <a th:href="@{/admin/study-material}" class="card">
                <h3>📂 Admin Assignment</h3>
                <p>Upload assignments</p>
            </a>

            <a th:href="@{/admin/attendance}" class="card">
                <h3>📊 Admin Attendance</h3>
                <p>Track attendance</p>
            </a>

        </div>
    </div>

</div>

</body>
</html>
