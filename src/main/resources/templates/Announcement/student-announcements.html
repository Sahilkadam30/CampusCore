<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Student Announcements</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#F6F0D7;
    margin:0;
    padding-left :20px;
}

/* HEADER */
.header {
    background: #4F4D46;
    color: white;
    padding: 10px;
    text-align: center;
    position: relative;
}
.back-btn {
    position: absolute;
    left: 15px;
    top: 20px;
    padding: 8px 14px;
    background: white;
    color: #0d6efd;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

/* SECTION TITLES */
.section-title{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

/* NOTICE CARD */
.notice{
    background:white;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    transition:0.3s;
}

.notice:hover{
    transform:scale(1.01);
}

/* PINNED */
.pinned{
    border-left:6px solid #ff9800;
    background:#fff8e1;
}

/* PRIORITY COLORS */
.priority-high{
    color:red;
    font-weight:bold;
}

.priority-medium{
    color:orange;
    font-weight:bold;
}

.priority-low{
    color:green;
    font-weight:bold;
}

/* FILE LINK */
.file-link{
    display:inline-block;
    margin-top:10px;
    text-decoration:none;
    color:#1976d2;
    font-weight:bold;
}

.file-link:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <a href="/dashboard" class="back-btn">← Back</a>
    <h1>📢 Campus Announcements</h1>
</div>

<!-- ================= PINNED SECTION ================= -->
<div class="section-title">📌 Important Notices</div>

<div th:if="${pinned != null}">
    <div th:each="p : ${pinned}" class="notice pinned">

        <h3 th:text="${p.title}"></h3>
        <p th:text="${p.message}"></p>

        <p>
            Priority :
            <span th:text="${p.priority}"
                  th:class="'priority-'+${#strings.toLowerCase(p.priority)}">
            </span>
        </p>

        <p>
            Posted on :
            <span th:text="${#temporals.format(p.createdAt,'dd MMM yyyy HH:mm')}"></span>
        </p>

        <!-- FIXED: correct variable + null safety -->
        <div th:if="${p != null and p.attachment != null}">
            <a class="file-link"
               th:href="@{'/uploads/announcement/' + ${p.attachment}}"
               target="_blank">
               📄 View Notice
            </a>
        </div>

    </div>
</div>

<!-- ================= NORMAL ANNOUNCEMENTS ================= -->
<div class="section-title">📢 All Announcements</div>

<div th:if="${announcements != null}">
    <div th:each="a : ${announcements}" class="notice">

        <h3 th:text="${a.title}"></h3>
        <p th:text="${a.message}"></p>

        <p>
            Priority :
            <span th:text="${a.priority}"
                  th:class="'priority-'+${#strings.toLowerCase(a.priority)}">
            </span>
        </p>

        <p>
            Posted on :
            <span th:text="${#temporals.format(a.createdAt,'dd MMM yyyy HH:mm')}"></span>
        </p>

        <!-- FIXED: null safety -->
        <div th:if="${a != null and a.attachment != null}">
            <a class="file-link"
               th:href="@{'/uploads/announcement/' + ${a.attachment}}"
               target="_blank">
               📄 View Notice
            </a>
        </div>

    </div>
</div>

</body>
</html>
