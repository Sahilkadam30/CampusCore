<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Admin Attendance</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>

body{
    font-family: Arial, sans-serif;
    background:#F6F0D7;
    margin:0;
    padding:0px;
}
.header {
    background: #4F4D46;
    color: white;
    padding: 10px;
    text-align: center;
    position: relative;
}
.back-btn {
    position: absolute;
    left: 15px;
    top: 20px;
    padding: 8px 14px;
    background: white;
    color: #0d6efd;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}
/* page title */
h2{
    text-align:center;
    margin-bottom:30px;
}

h3{
    text-align:center;
}

/* container cards */
.container{
    background:white;
    padding:20px;
    margin:20px auto;
    width:80%;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* forms */
form{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-top:10px;
}

input, select{
    padding:8px;
}

/* buttons */
button{
    padding:8px 14px;
    background:#4CAF50;
    border:none;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#3e8e41;
}

/* table */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th, td{
    padding:10px;
    text-align:center;
}

th{
    background:#e6d9a7;
}

tr:nth-child(even){
    background:#f9f9f9;
}

/* percentage colors */
.green{
    color:green;
    font-weight:bold;
}

.orange{
    color:orange;
    font-weight:bold;
}

.red{
    color:red;
    font-weight:bold;
}

/* alert */
.alert{
    background:#ffe5e5;
    color:red;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    text-align:center;
    font-weight:bold;
}

/* chart */
canvas{
    max-width:700px;
    margin:20px auto;
    display:block;
}

#attendanceChart{
    width:90%;
    max-width:1000px;
    height:500px;
    margin:auto;
    display:block;
}

</style>
</head>

<body>
<div class="header">
    <a th:href="@{/admin/dashboard}" class="back-btn">← Back</a>
    <h2>Admin Attendence Management</h2>
</div>
<div th:if="${successMessage}" 
     id="popupMessage"
     class="alert alert-success text-center">

    <span th:text="${successMessage}"></span>

</div>

<!-- ================= Excel Upload ================= -->

<div class="container">

<h3>Upload Attendance Excel</h3>

<form th:action="@{/admin/uploadAttendance}" method="post" enctype="multipart/form-data">

<input type="file" name="file" required>

<select name="month" required>
<option value="">Select Month</option>
<option>January</option>
<option>February</option>
<option>March</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>
</select>

<select name="year" required>
<option value="">Select Month</option>
<option>First Year</option>
<option>Second Year</option>
<option>Third Year</option>
<option>Fourth Year</option>
</select>

<button type="submit">Upload</button>

</form>

</div>


<!-- ================= Search Student ================= -->

<div class="container">

<h3>Search Student Attendance</h3>

<form th:action="@{/admin/searchAttendance}" method="get">

<input type="text" name="prn" placeholder="Enter PRN" required>

<select name="month" required>
<option value="">Select Month</option>
<option>January</option>
<option>February</option>
<option>March</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>
</select>

<select name="year" required>
<option value="">Select Month</option>
<option>First Year</option>
<option>Second Year</option>
<option>Third Year</option>
<option>Fourth Year</option>
</select>

<button type="submit">Search</button>

</form>

</div>


<!-- ================= Attendance Table ================= -->

<div class="container" th:if="${attendanceList != null}">

<h3 th:text="'Attendance of PRN: ' + ${prn} + ' (' + ${month} + ' - ' + ${year} + ')'"></h3>

<table>

<tr>
<th>Subject</th>
<th>Total Classes</th>
<th>Attended Classes</th>
<th>Percentage</th>
</tr>

<tr th:each="a : ${attendanceList}">

<td th:text="${a.subject}"></td>

<td th:text="${a.totalClasses}"></td>

<td th:text="${a.attendedClasses}"></td>

<td>

<span th:text="${#numbers.formatDecimal(a.percentage,1,2)} + '%'"
th:classappend="${a.percentage >= 75} ? 'green' :
                 (${a.percentage >= 50} ? 'orange' : 'red')">
</span>

</td>

</tr>

</table>

</div>


<!-- ================= Low Attendance Alert ================= -->

<div class="container" th:if="${attendanceList != null}">

<div th:each="a : ${attendanceList}">

<div class="alert" th:if="${a.percentage < 75}">
⚠ Low Attendance Alert in <b th:text="${a.subject}"></b>
(<span th:text="${#numbers.formatDecimal(a.percentage,1,2)}"></span>%)
</div>

</div>

</div>


<!-- ================= Attendance Graph ================= -->

<div class="container" th:if="${attendanceList != null}">

<h3>Attendance Graph</h3>

<canvas id="attendanceChart"></canvas>

</div>


<script th:inline="javascript">

let subjects = /*[[${attendanceList != null ? attendanceList.![subject] : {}}]]*/ [];
let percentages = /*[[${attendanceList != null ? attendanceList.![percentage] : {}}]]*/ [];

if(subjects.length > 0){

const ctx = document.getElementById('attendanceChart');

new Chart(ctx,{
    type:'bar',
    data:{
        labels:subjects,
        datasets:[{
            label:'Attendance %',
            data:percentages
        }]
    },
    options:{
        responsive:true,
        scales:{
            y:{
                beginAtZero:true,
                max:100
            }
        }
    }
});

}

</script>

<script>

setTimeout(function(){

    let popup = document.getElementById("popupMessage");

    if(popup){
        popup.style.display = "none";
    }

},2000);

</script>
</body>
</html>
