<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Login</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #141e30, #243b55);
            margin: 0;
        }

        .login-container {
            background-color: #1f1f1f;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
            background-color: #ffffff;
            color: #000;
        }

        input::placeholder {
            color: #666;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #4CAF50;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        /* 🔥 Buttons in one row */
        .link-row {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            gap: 10px;
        }

        .link-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            transition: 0.3s;
        }

        .register-btn {
            background-color: #2196F3;
            color: white;
        }

        .register-btn:hover {
            background-color: #1976D2;
        }

        .student-btn {
            border: 2px solid #00c6ff;
            color: #00c6ff;
            background: transparent;
        }

        .student-btn:hover {
            background: #00c6ff;
            color: #000;
        }

        .error {
            color: #ff4d4d;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>

</head>
<body>

<div class="login-container">

    <h2>Admin Login 👨‍💼</h2>

    <form th:action="@{/admin/login}" method="post">
        <input type="text" name="adminId" placeholder="Admin ID" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="link-row">
        <a th:href="@{/admin/register}" class="link-btn register-btn">
            Register
        </a>

        <a th:href="@{/}" class="link-btn student-btn">
            Student Login
        </a>
    </div>

    <p class="error" th:text="${error}"></p>

</div>

</body>
</html>
