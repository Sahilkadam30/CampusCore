<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Login</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #141e30, #243b55);
        }

        .login-container {
            background-color: #1f1f1f;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
            text-align: center;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 14px;
            background-color: #ffffff;
            color: #000;
        }

        input:focus {
            box-shadow: 0 0 5px #4CAF50;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background-color: #4CAF50;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: #45a049;
            transform: scale(1.02);
        }

        .error {
            color: #ff4d4d;
            margin-top: 10px;
        }

        .success {
            color: lightgreen;
            margin-top: 10px;
        }

        /* 🔥 One row buttons */
        .link-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 20px;
        }

        .link-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            transition: 0.3s;
        }

        .register-btn {
            background-color: #2196F3;
            color: white;
        }

        .register-btn:hover {
            background-color: #1976D2;
        }

        .admin-btn {
            border: 2px solid #00c6ff;
            color: #00c6ff;
            background: transparent;
        }

        .admin-btn:hover {
            background: #00c6ff;
            color: #000;
        }

    </style>
</head>
<body>

<div class="login-container">

    <h2>Student Login 🎓</h2>

    <form th:action="@{/login}" method="post">
        <input type="text" name="prn" placeholder="PRN Number" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p class="error" th:text="${error}"></p>
    <p class="success" th:text="${success}"></p>

    <!-- 🔥 Side-by-side buttons -->
    <div class="link-row">
        <a th:href="@{/register}" class="link-btn register-btn">
            Register
        </a>

        <a th:href="@{/admin/login}" class="link-btn admin-btn">
            Admin Login
        </a>
    </div>

</div>

</body>
</html>
